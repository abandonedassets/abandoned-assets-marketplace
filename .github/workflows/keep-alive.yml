name: Keep Render Alive

on:
  schedule:
    # Triggers every 14 minutes to beat Render's 15-minute sleep cycle
    - cron: "*/14 * * * *" 
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Juggernaut Anti-Sleep Protocol
        run: |
          echo "Initiating forced pipeline clearance..."
          curl -s -S --retry 10 --retry-connrefused --retry-max-time 120 --retry-delay 10 -m 60 https://abandoned-assets-marketplace.onrender.com/
          echo "Pipeline clear. Render is locked awake."
