name: Institutional Heartbeat
on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, and 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-system:
    runs-on: ubuntu-latest
    steps:
      - name: System Health Check
        run: |
          # Institutional Pulse Check: Pinging production environment
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://abandoned-assets-marketplace.onrender.com || echo "000")
          
          if [ "$RESPONSE" != "200" ]; then
            echo "SYSTEM ALERT: Heartbeat failed with status $RESPONSE. Investigation required."
            exit 1
          else
            echo "System healthy: $RESPONSE (Connection verified)"
          fi
