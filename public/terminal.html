<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Settlement Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #ffb000; 
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-y: auto;
            height: 100vh;
        }
        .header {
            border-bottom: 1px solid #ffb000;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
        }
        .terminal-feed {
            font-size: 13px;
            line-height: 1.8;
        }
        .entry { margin-bottom: 8px; border-left: 2px solid #333; padding-left: 10px; }
        .alpha { color: #00ff00; font-weight: bold; } /* Green for verified alpha edge */
        .standard { color: #ffb000; }
        .quarantine { color: #ff0000; font-weight: bold; } /* Red for blocked anomalies */
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header" id="terminal-header">
        <div>CORE ENGINE: CONNECTING</div>
        <div>PIPELINE: STREAM_INITIALIZATION</div>
        <div>BAL: [AUTONOMOUS TRACKING]</div>
    </div>
    
    <div class="terminal-feed" id="feed">
        <div class="entry">[SYSTEM]: Connecting to Cloud Telemetry Router...<span class="blink">_</span></div>
    </div>

    <script>
        async function executeTelemetrySweep() {
            try {
                const response = await fetch('/api/terminal-feed');
                const json = await response.json();
                
                if (json.status === 'ONLINE') {
                    const feed = document.getElementById('feed');
                    const header = document.getElementById('terminal-header');
                    
                    // Update Terminal Header with Data Pipe Origins
                    header.innerHTML = `
                        <div>SYSTEM STATUS: <span style="color:#00ff00">ONLINE</span></div>
                        <div>FEED CONFIG: ${json.pipeline}</div>
                        <div>INGESTION BLOCKS: ${json.queue_count}</div>
                    `;

                    feed.innerHTML = '';
                    
                    json.data.forEach(item => {
                        const entry = document.createElement('div');
                        
                        const timeObj = new Date(item.timestamp);
                        const timeStr = timeObj.toLocaleTimeString('en-US', { hour12: false });
                        
                        let logLine = `[${timeStr}] `;

                        if (item.circuit_breaker === 'QUARANTINED_ANOMALY') {
                            entry.className = 'entry quarantine';
                            logLine += `CRITICAL: Asset at ${item.address} BLOCKED BY CIRCUIT BREAKER. Reason: Corrupt/Negative Margin Math.`;
                        } else if (item.alpha_target === true) {
                            entry.className = 'entry alpha';
                            logLine += `ALPHA TARGET DETECTED: ${item.address} | DELTA: ${item.delta_score} | ROUTED TO: ${item.execution_tier}`;
                        } else {
                            entry.className = 'entry standard';
                            logLine += `METRIC PASSED: ${item.address} | DELTA: ${item.delta_score} | ROUTED TO: ${item.execution_tier}`;
                        }
                        
                        entry.textContent = logLine;
                        feed.appendChild(entry);
                    });

                    window.scrollTo(0, document.body.scrollHeight);
                }
            } catch (error) {
                console.error("Telemetry hardware link disruption. Re-routing stream...", error);
            }
        }

        // Execution interval set to institutional high frequency (3000ms sweep cycles)
        setInterval(executeTelemetrySweep, 3000);
        executeTelemetrySweep();
    </script>
</body>
</html>
