<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <h1>// PRODUCTION_TERMINAL</h1>
    <pre id="log">STREAMING_LIVE_SUPABASE_DATA...</pre>
    <script>
        const log = document.getElementById('log');
        const queue = [];
        const seen = new Set();
        let polling = false;

        const money = value => {
            const number = Number(value || 0);
            return Number.isFinite(number) && number > 0 ? '$' + Math.round(number).toLocaleString() : 'N/A';
        };

        const keyFor = item => String(item.id || item.property_id || item.address || JSON.stringify(item));

        function enqueue(rows) {
            rows.forEach(item => {
                const key = keyFor(item);
                if (!seen.has(key) && !queue.some(event => event.key === key)) queue.push({ key, item });
            });
        }

        function renderNext() {
            if (!queue.length) return;
            const { key, item } = queue.shift();
            seen.add(key);
            const line = `[LIVE_ASSET] ${item.address || 'UNKNOWN ADDRESS'} | BASIS ${money(item.purchase_price || item.price || item.asking_price)} | ARV ${money(item.arv || item.after_repair_value)} | STATUS ${item.status || item.assignment_status || 'LIVE'}`;
            log.innerText = `${new Date().toISOString()} ${line}\n` + log.innerText;
            log.innerText = log.innerText.split('\n').slice(0, 60).join('\n');
        }

        async function poll() {
            if (polling) return;
            polling = true;
            try {
                const res = await fetch('/api/terminal-feed?limit=500');
                const data = await res.json();
                if (data.status === 'SUCCESS') {
                    enqueue(Array.isArray(data.data) ? data.data : []);
                    if (seen.size === 0 && queue.length === 0) log.innerText = 'ONLINE: NO_ACTIVE_DEALS_FOUND. Waiting for Supabase records...';
                } else {
                    log.innerText = `CRITICAL_FAILURE: ${data.error || 'UNKNOWN_SERVER_ERROR'}\nDIAGNOSTIC: ${data.diagnostic_hint || 'Check server logs.'}`;
                }
            } catch (error) {
                log.innerText = `CONNECTION_REFUSED: ${error.message}`;
            } finally {
                polling = false;
            }
        }

        setInterval(poll, 30000);
        setInterval(renderNext, 1800);
        poll();
    </script>
</body>
</html>
