<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlement Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #ffb000; 
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-y: auto;
            height: 100vh;
        }
        .header {
            border-bottom: 1px solid #ffb000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .terminal-feed {
            font-size: 14px;
            line-height: 1.6;
        }
        .entry { margin-bottom: 6px; }
        .success { color: #00ff00; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header" id="terminal-header">
        <div>SYSTEM STATUS: --</div>
        <div>INGESTION QUEUE: --</div>
        <div>TELEMETRY: CONNECTING</div>
    </div>
    
    <div class="terminal-feed" id="feed">
        <div class="entry">[SYSTEM]: Initializing connection to telemetry stream...<span class="blink">_</span></div>
    </div>

    <script>
        async function executeTelemetrySweep() {
            try {
                const response = await fetch('/api/terminal-feed');
                const json = await response.json();
                
                if (json.status === 'ONLINE') {
                    const feed = document.getElementById('feed');
                    const header = document.getElementById('terminal-header');
                    
                    // Update header parameters
                    header.innerHTML = `
                        <div>SYSTEM STATUS: <span class="success">ONLINE</span></div>
                        <div>ACTIVE INSTANCES: ${json.queue_count}</div>
                        <div>BAL: [AUTONOMOUS ENGINE]</div>
                    `;

                    // Clear previous buffer and output live data rows
                    feed.innerHTML = '';
                    if (json.data.length === 0) {
                        feed.innerHTML = `<div class="entry">[SYSTEM]: Stream active. Awaiting new ledger entries...</div>`;
                    } else {
                        json.data.forEach(item => {
                            const entry = document.createElement('div');
                            entry.className = 'entry success';
                            
                            const timeObj = new Date(item.created_at);
                            const timeStr = timeObj.toLocaleTimeString('en-US', { hour12: false });
                            
                            entry.textContent = `[${timeStr}] SUCCESS: Asset tracked at ${item.address} (Value: $${item.arv || 'VERIFYING'})`;
                            feed.appendChild(entry);
                        });
                    }
                    window.scrollTo(0, document.body.scrollHeight);
                }
            } catch (error) {
                console.error("Telemetry link lost. Re-establishing connection...", error);
            }
        }

        // High-frequency execution cycle (every 3000ms)
        setInterval(executeTelemetrySweep, 3000);
        executeTelemetrySweep();
    </script>
</body>
</html>
