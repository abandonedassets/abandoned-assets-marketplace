<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Marketplace</title>
</head>
<body class="bg-slate-50 p-10">
    <h1 class="text-3xl font-bold mb-6">Available Assets</h1>
    <div id="data-container" class="grid gap-4">Loading...</div>

    <script>
        const supabase = supabase.createClient('https://midneoooykeoquxkjkrg.supabase.co', 'sb_publishable_wH2in1zbqd1jNggdbNT5iQ_1BiDXzLd');

        async function loadData() {
            const { data, error } = await supabase.from('marketplace_listings').select('*');
            const container = document.getElementById('data-container');
            
            if (error) { container.innerText = "Error loading data."; return; }
            
            container.innerHTML = data.map(item => `
                <div class="p-4 bg-white shadow rounded border border-slate-200">
                    <p class="font-bold">${item.address}</p>
                    <p class="text-slate-600">${item.category}</p>
                    <p class="text-blue-900 font-semibold">${item.status}</p>
                </div>
            `).join('');
        }
        loadData();
    </script>
</body>
</html>
