<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institutional Deal Tape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Institutional Deal Tape</h1>
        <div id="data-container">
            <p id="status">Loading deal data...</p>
        </div>
    </div>

    <script>
        console.log("Script initializing...");

        const SUPABASE_URL = 'https://midneooocykeoquxkjkrg.supabase.co';
        // PASTE YOUR FULL KEY HERE:
        const SUPABASE_KEY = 'PASTE_YOUR_FULL_ANON_KEY_HERE';

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log("Supabase client created.");

        async function init() {
            try {
                console.log("Attempting to fetch data...");
                const { data, error } = await client
                    .from('qre_institutional_deal_tape')
                    .select('address,market,state_module,cost_basis,arv_projection,status');

                if (error) throw error;
                
                console.log("Data retrieved:", data);
                document.getElementById('status').innerText = "Data loaded successfully.";
                // (Rendering logic would go here)
                
            } catch (err) {
                console.error("Critical Failure:", err);
                document.getElementById('status').innerText = "Error: " + err.message;
            }
        }

        init();
    </script>
</body>
</html>
