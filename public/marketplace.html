<!DOCTYPE html>
<html>
<body>
    <div id="status">Testing Network...</div>
    <script>
        // Use your full URL here
        const URL = 'https://midneooocykeoquxkjkrg.supabase.co/rest/v1/qre_institutional_deal_tape';
        
        // Use your anon key here
        const API_KEY = 'YOUR_FULL_ANON_KEY_HERE';

        fetch(URL, {
            method: 'GET',
            headers: {
                'apikey': API_KEY,
                'Authorization': `Bearer ${API_KEY}`
            }
        })
        .then(res => {
            document.getElementById('status').innerText = "Status: " + res.status;
            return res.json();
        })
        .then(data => console.log(data))
        .catch(err => {
            document.getElementById('status').innerText = "Network Error: " + err.message;
            console.error(err);
        });
    </script>
</body>
</html>
