<script>
        // 1. URL FIXED: Added the missing 'c' (midneooocy...)
        const supabaseUrl = 'https://midneooocykeoquxkjkrg.supabase.co';
        
        // 2. IMPORTANT: Paste your ENTIRE key here. Do not leave the "..." at the end!
        const supabaseKey = 'sb_publishable_WH2in1zbqd1jNggd'; 
        
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadData() {
            const container = document.getElementById('data-container');

            const { data, error } = await supabaseClient
                .from('qre_institutional_deal_tape')
                .select('asset_id,address,market,state_module,cost_basis,arv_projection,micro_market,status');

            if (error) {
                console.error("Fetch Error:", error);
                container.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"><p>Error loading data: ${error.message}</p></div>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded"><p>No deals found in the database.</p></div>`;
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                    <h3 class="text-xl font-bold text-gray-900 mb-2">${item.address}</h3>
                    <p class="text-gray-600 mb-1"><strong>Market:</strong> ${item.market}, ${item.state_module}</p>
                    <p class="text-green-700 font-semibold mb-1"><strong>Basis:</strong> $${item.cost_basis.toLocaleString()}</p>
                    <p class="text-blue-700 font-semibold mb-3"><strong>ARV:</strong> $${item.arv_projection.toLocaleString()}</p>
                    <span class="inline-block bg-gray-200 rounded-full px-3 py-1 text-sm font-semibold text-gray-700 capitalize">
                        Status: ${item.status}
                    </span>
                </div>
            `).join('');
        }

        loadData();
    </script>
