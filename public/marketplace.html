<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Marketplace</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .property-card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .action-button { background: #1e3a8a; color: #fff; padding: 12px; border: none; width: 100%; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="property-card">
        <h2>2847 Oak Ridge Drive, Phoenix AZ 85001</h2>
        <button class="action-button" onclick="openVDR('2847 Oak Ridge Drive, Phoenix AZ 85001')">View Details</button>
    </div>
    <div class="property-card">
        <h2>1523 Maple Street, Atlanta GA 30303</h2>
        <button class="action-button" onclick="openVDR('1523 Maple Street, Atlanta GA 30303')">View Details</button>
    </div>

    <div id="vdr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:30px; border-radius:10px; width:400px;">
            <h2 id="modal-address">Asset Details</h2>
            <p><strong>Status:</strong> Underwriting Required</p>
            <button onclick="document.getElementById('vdr-modal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        function openVDR(address) {
            document.getElementById('modal-address').innerText = address;
            document.getElementById('vdr-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
