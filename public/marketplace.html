<script>
  // Robust initialization: only create the client if it doesn't already exist
  if (!window.supabaseClient) {
    window.supabaseClient = supabase.createClient(
      'https://midneoooykeoquxkjkrg.supabase.co', 
      'sb_publishable_WH2in1zbqd1jNggd...'
    );
  }
  const supabase = window.supabaseClient;

  async function loadData() {
    const container = document.getElementById('data-container');
    container.innerHTML = "Loading...";

    const { data, error } = await supabase
      .from('qre_institutional_deal_tape')
      .select('asset_id,address,market,state_module,cost_basis,arv_projection,micro_market,status');

    if (error) {
      console.error("Fetch Error:", error);
      container.innerHTML = "Error loading data.";
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "No deals found.";
      return;
    }

    container.innerHTML = data.map(item => `
      <div class="deal-card">
        <h3>${item.address}</h3>
        <p>Market: ${item.market}, ${item.state_module}</p>
        <p>Basis: $${item.cost_basis.toLocaleString()}</p>
        <p>ARV: $${item.arv_projection.toLocaleString()}</p>
        <p>Status: ${item.status}</p>
      </div>
    `).join('');
  }

  loadData();
</script>
