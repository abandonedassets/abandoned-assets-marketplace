<script>
    // Correct initialization
    const supabase = supabase.createClient('https://midneoooykeoquxkjkrg.supabase.co', 'sb_publishable_wH2in1zbqd1jNggdbNT5iQ_1BiDXzLd');

    async function loadData() {
        const container = document.getElementById('data-container');
        
        // Fetching from the new view
        const { data, error } = await supabase
            .from('qre_institutional_deal_tape')
            .select('asset_id,address,market,state_module,cost_basis,arv_projection,micro_market,status');
            
        if (error) { 
            console.error("Fetch Error:", error);
            container.innerText = "Error loading data."; 
            return; 
        }
        
        // Rendering the new data structure
        container.innerHTML = data.map(item => `
            <div class="p-4 bg-white shadow rounded border border-slate-200">
                <p class="font-bold">${item.address}</p>
                <p class="text-slate-600">${item.market}, ${item.state_module}</p>
                <p class="text-blue-900 font-semibold">Basis: $${item.cost_basis.toLocaleString()}</p>
                <p class="text-blue-900 font-semibold">ARV: $${item.arv_projection.toLocaleString()}</p>
                <p class="text-green-700">Status: ${item.status}</p>
            </div>
        `).join('');
    }
    
    loadData();
</script>
