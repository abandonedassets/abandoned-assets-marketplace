<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institutional Deal Tape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="data-container">Loading deal data...</div>
    <script>
        const SUPABASE_URL = 'https://midneooocykeoquxkjkrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_wH2in1zbqd1jNggdbNT5iQ_1BiDXzLd';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            try {
                const { data, error } = await client.from('qre_institutional_deal_tape').select('*');
                if (error) throw error;
                document.getElementById('data-container').innerHTML = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('data-container').innerText = "Error: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
