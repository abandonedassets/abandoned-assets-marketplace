<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Deal Tape | Asset Portfolio</title>
    <style>
        :root { --primary: #0f172a; --accent: #1e3a8a; --muted: #64748b; --bg: #f1f5f9; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Institutional Header */
        header { margin-bottom: 40px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-val { font-size: 18px; font-weight: 800; margin-top: 5px; }

        /* Deal Tape Grid */
        .deal-tape { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .deal-card { background: #fff; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .deal-info h2 { margin: 0 0 10px 0; font-size: 18px; }
        .metrics { display: flex; gap: 20px; font-size: 14px; }
        
        .cta-btn { background: var(--accent); color: #fff; padding: 12px 24px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
