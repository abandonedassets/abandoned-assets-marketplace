<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institutional Deal Tape</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .deal-card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        #diligence-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:30px; border-radius:12px; width:90%; max-width:400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Active Deal Tape</h1>
        <div id="marketplace-listings">Loading live feed...</div>
    </div>

    <div id="diligence-modal">
        <div class="modal-content">
            <h2 id="modal-title">Access Data Room</h2>
            <button onclick="document.getElementById('diligence-modal').style.display='none'">Terminate</button>
        </div>
    </div>

    <script>
        async function fetchFeed() {
            const res = await fetch('/api/terminal-feed?limit=500');
            const { data } = await res.json();
            const container = document.getElementById('marketplace-listings');
            container.innerHTML = data.map(item => `
                <div class="deal-card" data-address="${item.address}">
                    <div><h3>${item.address}</h3><p>Spread: ${item.delta_score}%</p></div>
                    <button class="cta-btn">Initialize Underwriting</button>
                </div>
            `).join('');
        }

        // Delegate click for VDR
        document.addEventListener('click', (e) => {
            if(e.target.matches('.cta-btn')) {
                const address = e.target.closest('.deal-card').dataset.address;
                document.getElementById('modal-title').innerText = address;
                document.getElementById('diligence-modal').style.display = 'flex';
            }
        });

        fetchFeed();
        setInterval(fetchFeed, 30000);
    </script>
</body>
</html>
