<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Marketplace</title>
</head>
<body class="bg-slate-50 p-10">
    <h1 class="text-3xl font-bold mb-6">Available Assets</h1>
    <div id="data-container" class="grid gap-4">Loading...</div>

    <script>
        const supabase = supabase.createClient('https://midneoooykeoquxkjkrg.supabase.co', 'sb_publishable_wH2in1zbqd1jNggdbNT5iQ_1BiDXzLd');
async function loadData() {
    const container = document.getElementById('data-container');
    
    // Using the new view and guaranteed numeric fields
    const { data, error } = await supabase
        .from('qre_institutional_deal_tape')
        .select('asset_id,address,market,state_module,cost_basis,arv_projection,micro_market,status');

    if (error) {
        console.error("Fetch Error:", error);
        container.innerHTML = "Error loading data.";
        return;
    }

    // Displaying the clean, mapped data
    container.innerHTML = data.map(item => `
        <div class="deal-card">
            <h3>${item.address}</h3>
            <p>Market: ${item.market}, ${item.state_module}</p>
            <p>Basis: $${item.cost_basis.toLocaleString()}</p>
            <p>ARV: $${item.arv_projection.toLocaleString()}</p>
            <p>Status: ${item.status}</p>
        </div>
    `).join('');
}
        loadData();
    </script>
</body>
</html>
