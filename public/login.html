<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Abandoned Assets</title>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white shadow-md border-b-4 border-blue-900 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-900">Abandoned Assets</div>
            <div class="space-x-6">
                <a href="index.html" class="text-slate-700 font-semibold hover:text-blue-900 transition">Dashboard</a>
                <a href="marketplace.html" class="text-slate-700 font-semibold hover:text-blue-900 transition">Marketplace</a>
                <a href="login.html" class="bg-blue-900 text-white px-4 py-2 rounded-lg hover:bg-blue-800 transition">Login</a>
            </div>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="w-full max-w-md pt-20">
        <div class="bg-white rounded-lg shadow-2xl border-t-4 border-blue-900 p-8">
            <h1 class="text-3xl font-bold text-blue-900 mb-2 text-center">Sign In</h1>
            <p class="text-slate-600 text-center mb-6">Access your wholesale marketplace account</p>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-slate-700 font-semibold mb-2">Email Address</label>
                    <input type="email" placeholder="you@example.com" class="w-full border-2 border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-900 focus:ring-2 focus:ring-blue-900 transition">
                </div>
                
                <div>
                    <label class="block text-slate-700 font-semibold mb-2">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full border-2 border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-900 focus:ring-2 focus:ring-blue-900 transition">
                </div>
                
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center">
                        <input type="checkbox" class="mr-2 w-4 h-4 accent-blue-900">
                        <span class="text-slate-600">Remember me</span>
                    </label>
                    <a href="#" class="text-blue-900 font-semibold hover:underline">Forgot password?</a>
                </div>
                
                <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition mt-6">Sign In</button>
            </form>
            
            <div class="border-t border-slate-200 mt-6 pt-6">
                <p class="text-slate-600 text-center mb-4">Don't have an account?</p>
                <button type="button" class="w-full border-2 border-blue-900 text-blue-900 font-bold py-2 rounded-lg hover:bg-blue-50 transition">Create Account</button>
            </div>
            
            <div class="mt-6 p-4 bg-slate-50 rounded-lg border border-slate-200">
                <p class="text-xs text-slate-500 text-center">Demo credentials for testing:<br><span class="font-mono text-slate-700">demo@example.com / password123</span></p>
            </div>
        </div>
        
        <p class="text-center text-slate-600 text-sm mt-6">Industrial-grade wholesale marketplace for serious investors.</p>
    </div>
</body>
</html>
