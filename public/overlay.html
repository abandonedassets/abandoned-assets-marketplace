<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace;">
<div id="ui-layer"></div>
<script>
    const socket = new WebSocket('ws://' + window.location.hostname + ':8080');
    socket.onmessage = (e) => {
        const { type, data } = JSON.parse(e.data);
        if (type === 'ESCROW_INITIATED') {
            createCountdown(data);
        } else if (type === 'FRUIT_STRIPE_PAYOUT_SUCCESS') {
            triggerLiquidityExplosion();
        }
    };

    function triggerLiquidityExplosion() {
        // High-Dopamine Visual: Gold flash across screen
        document.body.style.backgroundColor = "#d4af37";
        setTimeout(() => document.body.style.backgroundColor = "#000", 500);
        console.log("PAYOUT REALIZED: JUGGERNAUT SUCCESS");
    }

    function createCountdown(data) {
        const layer = document.getElementById('ui-layer');
        const el = document.createElement('div');
        el.style.padding = '20px';
        el.style.border = '1px solid #0f0';
        el.style.margin = '10px';
        el.innerHTML = `ESCROW_INITIATED: ${data.id} | DEADLINE: ${new Date(data.deadline).toLocaleTimeString()}`;
        layer.appendChild(el);
    }
</script>
</body>
</html>
